name: Daily Digest

on:
  repository_dispatch:
    types: [morning_digest, evening_digest]
  workflow_dispatch:
    inputs:
      slot:
        description: 'morning or evening'
        required: true
        default: 'morning'

concurrency:
  group: digest-${{ github.event_name }}
  cancel-in-progress: false

# Needed for the step that commits sent_stories.json back.
permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore sent_stories.json
        run: |
          if [ ! -f sent_stories.json ]; then
            echo '{"sent": []}' > sent_stories.json
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "slot=${{ github.event.action == 'morning_digest' && 'morning' || 'evening' }}" >> $GITHUB_OUTPUT
          else
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          fi

      - name: Run digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --run-now ${{ steps.slot.outputs.slot }}

      - name: Persist sent_stories.json and archive.json
        if: always()
        run: |
          git add sent_stories.json archive.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to persist."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update brief state (sent stories + archive) [skip ci]"
            git push
          fi
